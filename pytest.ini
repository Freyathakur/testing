[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers - but we haven't defined all markers used in tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Note: We're using --strict-markers but conftest.py adds markers
# This can cause issues if tests use undefined markers

# This path doesn't exist - will cause warnings
log_file = ./pytest.log
log_file_level = DEBUG

# Minimum Python version differs from CI config
python_version = 3.10
