name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Wrong Python version - the code uses features from 3.10+ but we specify 3.9
    strategy:
      matrix:
        python-version: [ "3.9" ]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Get pip cache dir
      id: pip-cache
      run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.pip-cache.outputs.dir }}
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Missing python-dotenv installation but the code imports it

    - name: Lint with flake8
      run: |
        # This will fail due to:
        # - Unused imports (sys in main.py)
        # - Lines too long (> 79 chars)
        flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Note: F and E violations not explicitly set, but they will be caught

    - name: Run type checking
      run: |
        echo "Skipping mypy - not installed and would fail here"
        true

    - name: Run tests with pytest
      env:
        # DB_PATH is referenced in main.py but not properly set here
        # This could cause issues if the code tries to write to DB
        # The env var will use default "./db.json" which might not exist
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/ -v --tb=short --strict-markers
        # Test will fail due to:
        # - Import errors in test_models.py
        # - Wrong assertion in test_create_task_returns_wrong_status
        # - Possible flaky timestamp test

    - name: Generate coverage report
      if: always()
      run: |
        pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing || true

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install flake8
      run: pip install flake8

    - name: Run flake8
      run: |
        # This will fail with various style violations
        flake8 app/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=79 --statistics

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install bandit
      run: pip install bandit

    - name: Run security check
      run: bandit -r app/ -ll || true
